let chosen="";

let area=document.getElementById("countries");


function show(){

area.innerHTML="";

countries.forEach(c=>{

area.innerHTML +=`

<div class="country">

<h2>${c[0]} ${c[1]} | ${c[2]}</h2>

<p>وضعیت: 🟢 آزاد</p>

<button onclick="reserve('${c[1]}')">
رزرو کشور
</button>

</div>

`;

});

}


show();



function reserve(c){

chosen=c;

document.getElementById("countries").style.display="none";

document.getElementById("box").style.display="block";

document.getElementById("selected").innerHTML=
"کشور انتخابی: "+c;

}

function send(){

let player=document.getElementById("name").value;
let rubika=document.getElementById("rubika").value;

if(player=="" || rubika==""){
alert("لطفاً نام و آیدی روبیکا را وارد کنید");
return;
}

fetch("https://script.google.com/macros/s/AKfycbzFN90T3_GtI6lvH7PA7q1VRPf3UXtv_3Z-YWDm_ZRlT_zcHV9N6baMxJwL4o88qUhpqQ/exec", {
  method: "POST",
  headers: {
    "Content-Type": "text/plain;charset=utf-8"
  },
  body: JSON.stringify({
    country: chosen,
    name: player,
    rubika: rubika
  })
})
.then(res => res.text())
.then(data => {
  alert("رزرو با موفقیت ثبت شد ✅");
  location.reload();
}); 

}


function search(){

let text=document.getElementById("search").value.toLowerCase();

let items=document.getElementsByClassName("country");


for(let i=0;i<items.length;i++){

if(items[i].innerText.toLowerCase().includes(text))
items[i].style.display="block";

else
items[i].style.display="none";

}

}
