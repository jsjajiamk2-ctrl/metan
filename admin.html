<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">

<title>Admin Panel - Metan</title>

<style>

body{
background:#101010;
color:white;
font-family:tahoma;
text-align:center;
}

.card{
background:#222;
margin:15px;
padding:15px;
border-radius:15px;
}

pre{
white-space:pre-wrap;
text-align:left;
direction:ltr;
}

</style>

</head>

<body>

<h1>👑 پنل ادمین WORLD WAR METAN</h1>

<div id="requests">
در حال دریافت اطلاعات...
</div>


<script>

let api = "https://script.google.com/macros/s/AKfycbzFN90T3_GtI6lvH7PA7q1VRPf3UXtv_3Z-YWDm_ZRlT_zcHV9N6baMxJwL4o88qUhpqQ/exec";


fetch(api)

.then(response => response.text())

.then(data => {

document.getElementById("requests").innerHTML =
"<pre>" + data + "</pre>";

})


.catch(error => {

document.getElementById("requests").innerHTML =
"خطا در دریافت اطلاعات ❌";

console.log(error);

});


</script>


</body>
</html>
