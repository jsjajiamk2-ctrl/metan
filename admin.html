<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">

<title>Admin Panel - Metan</title>

<style>
body{
background:#101010;
color:white;
font-family:tahoma;
text-align:center;
}

.card{
background:#222;
margin:15px;
padding:15px;
border-radius:15px;
}

button{
padding:10px 20px;
border:0;
border-radius:10px;
margin:5px;
cursor:pointer;
}

.ok{
background:green;
color:white;
}

.no{
background:red;
color:white;
}
</style>

</head>

<body>

<h1>👑 پنل ادمین WORLD WAR METAN</h1>

<div id="requests">
در حال دریافت درخواست‌ها...
</div>


<script>

let api = "https://script.google.com/macros/s/AKfycbzFN90T3_GtI6lvH7PA7q1VRPf3UXtv_3Z-YWDm_ZRlT_zcHV9N6baMxJwL4o88qUhpqQ/exec";


function load(){

fetch(api)
.then(res=>res.json())
.then(data=>{

let box=document.getElementById("requests");

box.innerHTML="";


data.forEach(x=>{

box.innerHTML += 

<div class="card">

<h2>🌍 ${x.country}</h2>

<p>👤 بازیکن: ${x.name}</p>

<p>📱 روبیکا: ${x.rubika}</p>

<p>وضعیت: ${x.status}</p>


<button class="ok" onclick="approve(${x.row})">
✅ تایید
</button>


<button class="no" onclick="reject(${x.row})">
❌ رد
</button>


</div>

;

});

});

}


function approve(row){
alert("تایید درخواست ردیف "+row);
}


function reject(row){
alert("رد درخواست ردیف "+row);
}


load();

</script>

</body>
</html>
